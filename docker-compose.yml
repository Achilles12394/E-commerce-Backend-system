services:
  mysql:
    image: mysql:8.0.39
    container_name: retailflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: retailflow
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: retailflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: retailflow-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: retailflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  redis_data:
  es_data:
  minio_data:
